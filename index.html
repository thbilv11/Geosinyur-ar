<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GEOSINYUR AR</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .info-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 12px;
            z-index: 999;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: orange;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="info-box">
    <h2>Rahang dan Gigi Bawah Gajah Purba</h2>

    <p>
        Fragmen rahang dan gigi bawah gajah ini diperkirakan berasal dari gajah purba Stegodon tarigonocephalus
        yang hidup di kawasan Manyarejo sekitar 500.000 hingga 800.000tahun lalu.
    </p>

<button onclick="toggleAudio()">
    ▶ Play / Pause Narasi
</button>
    
    <audio id="audio" src="Narasi Rahang dan Gigi Bawah Gajah.mp3"></audio>
</div>

<button onclick="gantiGambar()">
    🔄 Lihat Rekonstruksi Gajah
</button>

<a-scene embedded arjs>

    <a-marker 
        preset="hiro"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">

        <a-image
            id="fosilImage"
            src="Rahang dan Gigi Bawah Gajah.png"
            position="0 1 0"
            rotation="-90 0 0"
            scale="2 2 2">
        </a-image>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
    function toggleAudio() {

        const audio = document.getElementById('audio');

        if (audio.paused) {
            audio.play();
        } else {
            audio.pause();
        }
    }
</script>

<script>

let mode = 0;

function gantiGambar() {

    const image = document.getElementById("fosilImage");

    if (mode === 0) {
        image.setAttribute("src", "Rahang dan Gigi Bawah Gajah Purba.png");
        mode = 1;
    } else {
        image.setAttribute("src", "Stegodon Trigonocephalus.png");
        mode = 0;
    }
}

</script>

</body>
</html>
