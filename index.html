<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <title>GEOSINYUR AR</title>

    <!-- AFRAME & AR.JS -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .info-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 15px;
            border-radius: 14px;
            z-index: 999;
        }

        h2 {
            margin-top: 0;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: orange;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            margin-right: 5px;
        }

        .hint {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- PANEL INFORMASI -->
    <div class="info-box">

        <h2>Rahang Gajah Purba</h2>

        <p>
            Fosil ini merupakan rahang dan gigi bawah
            <i>Stegodon trigonocephalus</i>,
            gajah purba yang hidup di Pulau Jawa
            sekitar 500.000 hingga 800.000 tahun lalu.
        </p>

        <!-- TOMBOL AUDIO -->
        <button onclick="toggleAudio()">
            ▶ Play / Pause Narasi
        </button>

        <!-- TOMBOL GANTI GAMBAR -->
        <button onclick="gantiGambar()">
            🔄 Swipe Rekonstruksi
        </button>

        <p class="hint">
            Tekan tombol rekonstruksi untuk melihat
            bentuk utuh Stegodon trigonocephalus.
        </p>

        <!-- AUDIO -->
        <audio id="audio" src="Narasi Rahang dan Gigi Bawah Gajah.mp3"></audio>

    </div>

    <!-- SCENE AR -->
    <a-scene
        embedded
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <!-- MARKER -->
        <a-marker
            preset="hiro"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">

            <!-- GAMBAR -->
            <a-image
                id="fosilImage"
                src="Rahang dan Gigi Bawah Gajah.png"
                position="0 1 0"
                rotation="-90 0 0"
                scale="2 2 2">
            </a-image>

        </a-marker>

        <!-- CAMERA -->
        <a-entity camera></a-entity>

    </a-scene>

    <!-- SCRIPT -->
    <script>

        // AUDIO PLAY / PAUSE
        function toggleAudio() {

            const audio = document.getElementById('audio');

            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // GANTI GAMBAR
        let mode = 0;

        function gantiGambar() {

            const image = document.getElementById("fosilImage");

            if (mode === 0) {

                image.setAttribute("src", "Stegodon Trigonocephalus.png");

                mode = 1;

            } else {

                image.setAttribute("src", "Rahang dan Gigi Bawah Gajah.png");

                mode = 0;
            }
        }

    </script>

</body>
</html>
